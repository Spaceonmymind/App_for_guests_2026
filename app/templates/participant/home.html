{% extends "base.html" %}

{% block content %}
<section class="home-screen">
    <img
        src="/static/img/decor-top-left.png"
        alt=""
        class="home-screen__decor home-screen__decor--top-left"
        aria-hidden="true"
    />
    <img
        src="/static/img/decor-top-right.png"
        alt=""
        class="home-screen__decor home-screen__decor--top-right"
        aria-hidden="true"
    />
    <img
        src="/static/img/decor-bottom-left.png"
        alt=""
        class="home-screen__decor home-screen__decor--bottom-left"
        aria-hidden="true"
    />
    <img
        src="/static/img/decor-bottom-right.png"
        alt=""
        class="home-screen__decor home-screen__decor--bottom-right"
        aria-hidden="true"
    />

    <div class="home-screen__content">
        <header class="home-screen__top">
        </header>

        <section class="home-screen__brand">
            <img
                src="/static/img/forum-logo-white.png"
                alt="Молодежный форум платежных технологий"
                class="home-screen__logo"
            />
        </section>

        <section class="home-menu" aria-label="Основные разделы">
            {% for item in menu_items %}
                <a href="{{ item.href }}" class="home-menu__item {% if item.title == 'Голосование' %}home-menu__item--wide{% endif %}">
                    <div class="home-menu__icon">
                        <img src="{{ item.icon }}" alt="" aria-hidden="true" class="home-menu__icon-image" />
                    </div>

                    <div class="home-menu__title">{{ item.title }}</div>
                </a>
            {% endfor %}
        </section>

    </div>

    <footer class="home-profile">
        <div class="home-profile__left">
            <div class="home-profile__avatar">
                <img src="/static/img/icon-user.png" alt="" class="home-profile__avatar-image" />
            </div>
            <div class="home-profile__meta">
                <div class="home-profile__name">{{ user.first_name }} {{ user.last_name }}</div>
                <div class="home-profile__role">{{ user.role_label }}</div>
            </div>
        </div>

        <button
            type="button"
            class="home-profile__chip"
            id="score-code-open"
        >
            код
        </button>
    </footer>

    <div class="score-code-modal" id="score-code-modal" aria-hidden="true">
        <div class="score-code-modal__backdrop" id="score-code-close-backdrop"></div>

        <div class="score-code-modal__dialog">
            <button
                type="button"
                class="score-code-modal__close"
                id="score-code-close"
                aria-label="Закрыть"
            >
                ×
            </button>

            <div class="score-code-modal__title">Ваш код</div>
            <div class="score-code-modal__value">{{ user.score_code or "—" }}</div>
            <div class="score-code-modal__text">
                Покажите этот код модератору для начисления баллов
            </div>
        </div>
    </div>

    <script>
        (function () {
            const openButton = document.getElementById("score-code-open");
            const modal = document.getElementById("score-code-modal");
            const closeButton = document.getElementById("score-code-close");
            const closeBackdrop = document.getElementById("score-code-close-backdrop");

            if (!openButton || !modal) return;

            const openModal = () => {
                modal.classList.add("score-code-modal--open");
                modal.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
            };

            const closeModal = () => {
                modal.classList.remove("score-code-modal--open");
                modal.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
            };

            openButton.addEventListener("click", openModal);

            if (closeButton) {
                closeButton.addEventListener("click", closeModal);
            }

            if (closeBackdrop) {
                closeBackdrop.addEventListener("click", closeModal);
            }

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    closeModal();
                }
            });
        })();
    </script>
</section>
{% endblock %}
