{% extends "base.html" %}

{% block content %}
<section class="home-screen">

    <div class="home-screen__content">

        <header class="home-screen__top">
            <p class="home-screen__caption">Интерактивы</p>
        </header>

        <section class="home-menu">
            {% for activity in activities %}
                <form method="post" action="/activities/{{ activity.id }}/join">
                    <button type="submit" class="home-menu__item">
                        <div class="home-menu__title">
                            {{ activity.name }}
                        </div>
                    </button>
                </form>
            {% endfor %}
        </section>

    </div>

    {% include "includes/bottom_nav.html" %}
</section>
{% endblock %}
