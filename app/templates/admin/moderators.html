{% extends "base.html" %}

{% block content %}
<section class="admin-screen">
    <div class="admin-screen__content">
        <header class="admin-screen__header">
            <h1 class="admin-screen__title">Модераторы</h1>
        </header>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Код</th>
                        <th>Имя</th>
                        <th>Фамилия</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody>
                    {% for moderator in moderators %}
                        <tr>
                            <td>{{ moderator.id }}</td>
                            <td>{{ moderator.code }}</td>
                            <td>{{ moderator.first_name }}</td>
                            <td>{{ moderator.last_name }}</td>
                            <td>{{ moderator.activation_status }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="admin-back">
            <a href="/admin" class="admin-back__link">← Назад в админку</a>
        </div>
    </div>
</section>
{% endblock %}
